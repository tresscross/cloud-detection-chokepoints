id: iam-federation-idp-created
name: Federation / identity-provider backdoor
tactic: persistence
attack_technique: [T1556.007]
priority: HIGH
prevalence: EMERGING
difficulty: MEDIUM

chokepoint:
  technique: >
    An attacker creates or modifies a SAML/OIDC identity provider in IAM, handing
    themselves a durable federated way in that survives password and access-key rotation.
  preconditions: >
    A credential holding iam:CreateSAMLProvider / iam:CreateOpenIDConnectProvider (or the
    Update/Add variants).
  attacker_controls: [user agent, source IP, tool, timing, provider name, IdP metadata]
  invariant: >
    eventName is one of the IdP provisioning calls. IdP creation is a rare, deliberate act
    — base rate is near-zero — so the event itself is the signal.
  event_names:
    - CreateSAMLProvider
    - UpdateSAMLProvider
    - CreateOpenIDConnectProvider
    - UpdateOpenIDConnectProviderThumbprint
    - AddClientIDToOpenIDConnectProvider

observability:
  status: OBSERVABLE
  cloudtrail_event_category: Management
  signal_field: eventName (+ requestParameters.name / .url for context)
  ingestion_notes: >
    The identity-center service-linked role legitimately performs routine SAML-provider
    maintenance — exclude service-linked roles (AWSServiceRoleFor*). Deliberate provider
    creation by an admin is rare and should still alert (analyst confirms it was expected).

detection:
  research:
    logic: "eventName in the IdP provisioning set — every create/update/delete."
    fp_rate: high
  hunt:
    logic: "Creates/updates only; group by actor + account."
    fp_rate: medium
  analyst:
    logic: >
      As hunt, excluding service-linked roles. Alert on any IdP create/update/delete by a
      non-service principal (expected volume << 1/week in most environments).
    fp_rate: low
    severity: HIGH

variations:
  - Cognito user-pool / identity-pool federation changes
  - AWS Identity Center (SSO) permission-set or trust changes (separate log source)

evolution_timeline:
  - "Federation-abuse persistence (adding a rogue IdP / trust) rose with cloud-identity attacks; the IAM APIs are stable."

raw_logs:
  - "eventName=CreateOpenIDConnectProvider, requestParameters.url=https://<attacker-oidc> (redacted)."

related:
  - iam-role-trust-external-principal

references:
  - "MITRE ATT&CK T1556.007 — Modify Authentication Process: Hybrid Identity"
  - "Threat intel [CAPABILITY]: No verified AWS incident; Scattered Spider federation abuse is IdP-tenant-level (Okta/Entra) per CISA AA23-320a, NOT an AWS CreateSAMLProvider call — commonly misattributed — see trends/aws-chokepoint-convergence.md"
