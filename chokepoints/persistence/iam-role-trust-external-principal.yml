id: iam-role-trust-external-principal
name: Role trust policy grants an external principal
tactic: persistence
attack_technique: [T1098.001]
priority: HIGH
prevalence: MEDIUM
difficulty: LOW

chokepoint:
  technique: >
    An attacker persists by editing a role's trust policy (or creating a role) so that a
    principal in an account THEY control can assume into the victim account. This survives
    password and access-key rotation — the foreign principal keeps its foothold.
  preconditions: >
    A credential holding iam:UpdateAssumeRolePolicy or iam:CreateRole.
  attacker_controls: [user agent, source IP, tool, timing, role name, the attacker's own account id]
  invariant: >
    eventName is UpdateAssumeRolePolicy or CreateRole and the assume-role policy document
    names an AWS principal in an account that is neither ours nor an established partner.
    Writing that Principal into the trust document is unavoidable.
  event_names: [UpdateAssumeRolePolicy, CreateRole]

observability:
  status: OBSERVABLE
  cloudtrail_event_category: Management
  signal_field: >
    requestParameters.policyDocument (UpdateAssumeRolePolicy) /
    requestParameters.assumeRolePolicyDocument (CreateRole) — the trust JSON string.
  ingestion_notes: >
    Extract the external account ONLY from the trust-document field — matching account ids
    across the whole raw event will false-capture the caller's own account. Service
    principals ("Service":"ec2.amazonaws.com") naturally do not match an account-id regex.

detection:
  research:
    logic: "eventName in (UpdateAssumeRolePolicy, CreateRole) — every occurrence."
    fp_rate: high
  hunt:
    logic: >
      Success only; the trust document contains an AWS-account principal
      (/"AWS"[^a]*arn:aws:iam::(\d{12}):/); group by underlying role + external account id.
    fp_rate: medium
  analyst:
    logic: >
      As hunt, where the external account is not in your org account list AND not in your
      established-external-trust allowlist (both built from YOUR baseline). Alert on any
      NEW external principal in a trust document.
    fp_rate: low
    severity: HIGH

variations:
  - PutKeyPolicy / PutBucketPolicy / repository & queue resource policies granting an external principal
  - Adding an external principal via CreatePolicy referenced by a role

evolution_timeline:
  - "Trust-policy structure unchanged; the invariant (a foreign account principal) is schema-stable."

raw_logs:
  - 'eventName=CreateRole, assumeRolePolicyDocument contains {"Principal":{"AWS":"arn:aws:iam::210987654321:root"}} (redacted).'

related:
  - sts-cross-account-new-principal
  - kms-key-sabotage

references:
  - "MITRE ATT&CK T1098.001 — Additional Cloud Credentials"
  - "Threat intel [INCIDENT (loose)]: Exposed-.env extortion + honeytoken case created attacker Lambda roles via CreateRole (Unit 42/Datadog, 2024-2025) — see trends/aws-chokepoint-convergence.md"
