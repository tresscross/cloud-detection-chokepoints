# Azure detection chokepoints — Privilege Escalation (TA0004)
# Anchored to Azure Activity Log operationName. Scope: #Vendor=microsoft #type=microsoft-azure-activity.

- id: AZ-PE-01
  name: RBAC role assignment created
  tactic: Privilege Escalation (TA0004)   # also Persistence T1098.003
  technique: [T1098.003]
  priority: HIGH
  prevalence: HIGH
  detection_difficulty: MEDIUM
  invariant: >
    Granting any RBAC role must call Microsoft.Authorization/roleAssignments/write. The
    privilege-escalation case is assigning Owner / Contributor / User Access Administrator to
    a principal the attacker controls (self, new service principal, external guest).
  observable:
    operation_names: [MICROSOFT.AUTHORIZATION/ROLEASSIGNMENTS/WRITE]
    log_class: ACTIVITY_LOG   # always on
    fields: [caller, identity.claims.idtyp, callerIpAddress, cloud.target.Resource.id]
  narrowing_invariant: >
    Assigned role is privileged (Owner/Contributor/UserAccessAdministrator) AND/OR the target
    principal is new/external. CAVEAT: the assigned role/principal are NOT cleanly parsed in
    the Activity Log (only the caller's authorizing role) — needs request-body inspection.
  actors: ["Storm-0501 (Azure ransomware — roleAssignments/write for control)", "Scattered Spider/UNC3944 (cloud RBAC abuse)"]
  observability_status: OBSERVABLE
  detection_maturity: research   # sev 30
  references: [https://attack.mitre.org/techniques/T1098/003/]

- id: AZ-PE-02
  name: Elevate access to all subscriptions (tenant-wide)
  tactic: Privilege Escalation (TA0004)
  technique: [T1548.005]
  priority: CRITICAL
  prevalence: EMERGING
  detection_difficulty: LOW
  invariant: >
    A Global Administrator calling Microsoft.Authorization/elevateAccess/action grants
    themselves User Access Administrator across EVERY subscription in the tenant — instant
    tenant-wide control. Single unavoidable operation; near-zero legitimate rate.
  observable:
    operation_names: [MICROSOFT.AUTHORIZATION/ELEVATEACCESS/ACTION]
    log_class: ACTIVITY_LOG
    fields: [caller, callerIpAddress]
  narrowing_invariant: Any occurrence is review-worthy (zero baseline).
  observability_status: OBSERVABLE
  detection_maturity: research
  references: [https://attack.mitre.org/techniques/T1548/005/]

- id: AZ-PE-03
  name: Custom role definition created or modified
  tactic: Privilege Escalation (TA0004)
  technique: [T1098.003]
  priority: MEDIUM
  prevalence: EMERGING
  detection_difficulty: MEDIUM
  invariant: >
    Creating/altering a custom role (Microsoft.Authorization/roleDefinitions/write) can smuggle
    privileged Actions (e.g. Microsoft.Authorization/*/write) into a benign-looking role.
  observable:
    operation_names: [MICROSOFT.AUTHORIZATION/ROLEDEFINITIONS/WRITE]
    log_class: ACTIVITY_LOG
  narrowing_invariant: Custom role whose permissions include Authorization/* or */write wildcards.
  observability_status: OBSERVABLE
  detection_maturity: research
  references: [https://attack.mitre.org/techniques/T1098/003/]
