id: azure-key-vault-secret-read
name: Key Vault secret read
cloud: azure
tactic: credential-access
attack_technique: [T1555.006]
priority: HIGH
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    SecretGet on a Key Vault is the unavoidable secret-theft read. But it is a DATA-PLANE
    operation — logged only if the vault's diagnostic settings route AuditEvent logs to Log
    Analytics. OFF by default.
  preconditions: >
    A principal holding Get on the Key Vault's secrets/keys (data-plane read).
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    SecretGet/KeyGet/CertificateGet on a Key Vault — the unavoidable secret-theft read.
  operations: [SecretGet, KeyGet, CertificateGet]

observability:
  status: INGEST_GAP
  log_source: Azure Activity Log
  log_class: DATA_PLANE
  notes: >
    BLOCKED — the Azure analogue of the AWS S3-GetObject / GCP Data-Access gap. Enable Key Vault
    AuditEvent diagnostic logging to Log Analytics (and forward it) to unblock.

detection:
  research: { fp_rate: high, logic: "SecretGet — every occurrence." }
  hunt: { fp_rate: medium, logic: "SecretGet/KeyGet/CertificateGet on a Key Vault — requires AuditEvent diagnostic logging routed to Log Analytics (off by default)." }
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      SecretGet/KeyGet/CertificateGet on a Key Vault — requires AuditEvent diagnostic logging
      routed to Log Analytics (off by default); exclude known-benign automation (allowlist from
      your baseline).

validation_tier: CAPABILITY
actors: []
references:
  - "https://attack.mitre.org/techniques/T1555/006/"
  - "trends/azure-chokepoint-convergence.md"
