# Azure detection chokepoints — Credential Access (TA0006)

- id: AZ-CA-01
  name: Storage account key regenerated
  tactic: Credential Access (TA0006)
  technique: [T1552]
  priority: MEDIUM
  prevalence: MEDIUM
  detection_difficulty: LOW
  invariant: >
    Microsoft.Storage/storageAccounts/regenerateKey/action rotates a storage account access
    key — a full-control credential. Regeneration mints a new attacker-usable key and can lock
    out legitimate consumers. Related: listKeys/listAccountSas (data-exfil enablers).
  observable:
    operation_names: [MICROSOFT.STORAGE/STORAGEACCOUNTS/REGENERATEKEY/ACTION, MICROSOFT.STORAGE/STORAGEACCOUNTS/LISTKEYS/ACTION]
    log_class: ACTIVITY_LOG
  narrowing_invariant: regenerateKey by a human/unexpected principal (listKeys/listAccountSas are routine — noisier).
  observability_status: OBSERVABLE
  detection_maturity: research
  references: [https://attack.mitre.org/techniques/T1552/]

- id: AZ-CA-02
  name: Key Vault access policy / vault write
  tactic: Credential Access (TA0006)
  technique: [T1098.003]
  priority: HIGH
  prevalence: MEDIUM
  detection_difficulty: MEDIUM
  invariant: >
    Microsoft.KeyVault/vaults/write (or access-policy change) can grant the attacker's principal
    Get/List on secrets/keys — a credential-access precursor that IS control-plane visible even
    though the secret READS themselves are not.
  observable:
    operation_names: [MICROSOFT.KEYVAULT/VAULTS/WRITE, MICROSOFT.KEYVAULT/VAULTS/ACCESSPOLICIES/WRITE]
    log_class: ACTIVITY_LOG
  narrowing_invariant: access-policy delta granting secret/key Get+List to a new/external principal.
  observability_status: PARTIAL   # policy change visible; secret reads are data-plane (blocked)
  detection_maturity: research
  references: [https://attack.mitre.org/techniques/T1098/003/]

- id: AZ-CA-03
  name: Key Vault secret read
  tactic: Credential Access (TA0006)
  technique: [T1555.006]
  priority: HIGH
  prevalence: HIGH
  detection_difficulty: LOW
  invariant: >
    SecretGet on a Key Vault is the unavoidable secret-theft read. But it is a DATA-PLANE
    operation — logged only if the vault's diagnostic settings route AuditEvent logs to Log
    Analytics. OFF by default.
  observable:
    operation_names: [SecretGet, KeyGet, CertificateGet]
    log_class: DATA_PLANE   # NOT in Activity Log — requires Key Vault diagnostic logging
  observability_status: INGEST_GAP
  observability_note: >
    BLOCKED — the Azure analogue of the AWS S3-GetObject / GCP Data-Access gap. Enable Key Vault
    AuditEvent diagnostic logging to Log Analytics (and forward it) to unblock.
  detection_maturity: blocked
  references: [https://attack.mitre.org/techniques/T1555/006/]
