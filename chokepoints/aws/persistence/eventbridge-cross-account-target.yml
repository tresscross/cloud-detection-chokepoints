id: aws-eventbridge-cross-account-target
name: EventBridge rule wired to a cross-account target
cloud: aws
tactic: persistence
attack_technique: [T1546]
priority: MEDIUM
prevalence: EMERGING
difficulty: MEDIUM

chokepoint:
  technique: >
    An attacker establishes event-driven persistence/exfil by pointing an EventBridge rule
    at a target (Lambda, SNS, SQS, event bus) in an account they control, so events or
    triggers flow to their infrastructure and survive session loss.
  preconditions: >
    A credential holding events:PutTargets (and usually events:PutRule).
  attacker_controls: [user agent, source IP, tool, timing, rule name]
  invariant: >
    eventName=PutTargets where the target ARN's account differs from the rule's account.
    Same-account PutTargets is often extremely high-volume legitimate app activity, so the
    shippable invariant is the CROSS-ACCOUNT target.
  operations: [PutTargets, PutRule]
  variations:
    - CreateFunction + Invoke (Lambda backdoor); Lambda EventSourceMapping to attacker resource
    - CloudWatch alarm / scheduled-rule triggering attacker code

observability:
  status: OBSERVABLE
  log_source: AWS CloudTrail
  log_class: Management
  signal_field: requestParameters.targets[].arn (extract target account); requestParameters.rule
  notes: >
    Environments with event-driven architectures generate huge same-account PutTargets
    volume across unbounded app roles — a static role allowlist is unworkable there. The
    cross-account-target cut is often a zero-baseline, high-signal invariant. Compare target
    account to the rule account with a real field-to-field comparison.
    Sample (redacted): eventName=PutTargets,
    requestParameters.targets[0].arn=arn:aws:lambda:us-east-1:210987654321:function:<fn>.

detection:
  research: { fp_rate: high, logic: "eventSource=events, eventName in (PutRule, PutTargets) — every occurrence." }
  hunt: { fp_rate: medium, logic: "PutTargets; extract target account from target ARN; group by actor + rule." }
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      PutTargets where the target account != the rule's account (cross-account). Same-account
      backdoors need composite (new-Lambda + new-rule by a fresh actor) logic — a separate hunt.

validation_tier: CAPABILITY
actors: []
evolution_timeline:
  - "Serverless persistence via event triggers is emerging; the EventBridge APIs are stable."
related: [aws-iam-federation-idp-created]
references:
  - "MITRE ATT&CK T1546 — Event Triggered Execution"
  - "Threat intel [CAPABILITY]: Event-driven persistence demonstrated in research; honeytoken case used Lambda+API Gateway persistence (Datadog, 2025) — see trends/aws-chokepoint-convergence.md"
  - "trends/aws-chokepoint-convergence.md"
