id: aws-secrets-manager-mass-read
name: Secrets Manager read by a human or unknown principal
cloud: aws
tactic: credential-access
attack_technique: [T1555.006]
priority: HIGH
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    An attacker who lands a foothold loots stored credentials via Secrets Manager. The
    unavoidable API is GetSecretValue. In a healthy environment secrets are read by service
    execution roles; a read by an interactive human, or by a principal outside a secret's
    normal reader set, is the anomaly.
  preconditions: >
    A credential holding secretsmanager:GetSecretValue on the target secret(s).
  attacker_controls: [user agent, source IP, tool, timing, which secret]
  invariant: >
    eventName is GetSecretValue by an interactive identity (IAMUser / SAMLUser /
    IdentityCenterUser / Root) or by a role off the secret's baseline reader set. The read
    itself is unavoidable; the identity/behaviour is the narrowing signal.
  operations: [GetSecretValue]
  variations:
    - BatchGetSecretValue (bulk read)
    - SSM GetParameter(s) with WithDecryption=true (parameter-store secret loot)
    - Reading key material from S3 / environment / instance user-data

observability:
  status: OBSERVABLE
  log_source: AWS CloudTrail
  log_class: Management
  signal_field: userIdentity.type; requestParameters.secretId / resources[].ARN
  notes: >
    Service roles generate very high GetSecretValue volume — do not alert on AssumedRole
    service reads. A per-secret -> allowed-role baseline is powerful but high-churn; the
    high-confidence tier is human/unknown-identity reads.
    Sample (redacted): eventName=GetSecretValue, userIdentity.type=IAMUser,
    requestParameters.secretId=<arn>.

detection:
  research: { fp_rate: high, logic: "eventName=GetSecretValue — group by reader identity + secret." }
  hunt: { fp_rate: medium, logic: "Reads by an interactive identity type (IAMUser / SAMLUser / IdentityCenterUser / Root)." }
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      Interactive-identity reads (any), OR IAMUser reads not in your known-automation-reader
      allowlist. Optionally add a per-secret -> allowed-role baseline as a Hunt tier.

validation_tier: INCIDENT
actors: [LUCR-3, Scattered Spider]
evolution_timeline:
  - "Secret-store looting is a near-universal post-exploitation step; GetSecretValue is stable."
related: [aws-iam-enumeration-burst]
references:
  - "MITRE ATT&CK T1555.006 — Credentials from Password Stores: Cloud Secrets Management Stores"
  - "Threat intel [INCIDENT]: LUCR-3/Scattered Spider scraped all Secrets Manager secrets via CloudShell (Permiso, 2023) — see trends/aws-chokepoint-convergence.md"
  - "trends/aws-chokepoint-convergence.md"
