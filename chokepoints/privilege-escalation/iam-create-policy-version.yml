id: iam-create-policy-version
name: IAM policy-version self-escalation
tactic: privilege-escalation
attack_technique: [T1098.003]
priority: CRITICAL
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    An identity with iam:CreatePolicyVersion on a managed policy it (or a role it holds) is
    bound to creates a new policy version granting Action:* / Resource:* and sets it as
    default — escalating to admin without CreateUser / AttachPolicy.
  preconditions: >
    A credential holding iam:CreatePolicyVersion on a customer-managed policy in the escalation path.
  attacker_controls: [user agent, source IP, CLI vs SDK vs console, timing, policy name]
  invariant: >
    eventName=CreatePolicyVersion and the new version's document grants a wildcard action
    while setAsDefault=true. No tool can reach the outcome without emitting this call with
    those request parameters.
  event_names: [CreatePolicyVersion]

observability:
  status: OBSERVABLE
  cloudtrail_event_category: Management
  signal_field: requestParameters.policyDocument (+ requestParameters.setAsDefault)
  ingestion_notes: >
    IAM writes are low-volume; any occurrence is review-worthy. The wildcard action and
    setAsDefault live in requestParameters — confirm your parser exposes them.

detection:
  research:
    logic: "eventName=CreatePolicyVersion — every occurrence."
    fp_rate: high
  hunt:
    logic: "setAsDefault=true; group by underlying role (sessionIssuer.userName)."
    fp_rate: medium
  analyst:
    logic: >
      As hunt, plus the policy document grants a wildcard action ("Action":"*"); exclude
      known IaC deploy roles (allowlist from YOUR baseline).
    fp_rate: low
    severity: HIGH

variations:
  - PutRolePolicy / PutUserPolicy (inline wildcard)
  - AttachRolePolicy with AdministratorAccess

evolution_timeline:
  - "Canonical AWS self-escalation primitive; API + request parameters unchanged since managed-policy versioning launched."

raw_logs:
  - 'eventName=CreatePolicyVersion, requestParameters.setAsDefault=true, policyDocument Action="*" (redacted).'

related:
  - iam-inline-policy-self-escalation
  - iam-privileged-policy-attach

references:
  - "MITRE ATT&CK T1098.003 — Additional Cloud Roles"
  - "Threat intel [AGGREGATE]: IAM privilege-escalation/anomaly prevalence; Unit 42 impossible-travel alerts +116% in 2024 (no attributed incident names the verb) — see trends/aws-chokepoint-convergence.md"
