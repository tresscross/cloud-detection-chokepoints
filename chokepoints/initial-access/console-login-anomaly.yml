id: console-login-anomaly
name: Console sign-in anomaly (MFA bypass / foreign geo)
tactic: initial-access
attack_technique: [T1078.004]
priority: HIGH
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    An attacker with stolen credentials signs in to the AWS console. The unavoidable event
    is ConsoleLogin. The narrowing invariants are (a) a direct IAM-user login without MFA,
    and (b) a login from a geo outside the organisation's operating footprint.
  preconditions: >
    Valid console credentials (or a valid federated session).
  attacker_controls: [user agent, browser, timing]
  invariant: >
    eventName=ConsoleLogin with additionalEventData.MFAUsed=No for a direct IAMUser
    (non-federated), or from a source country outside the operating-geo set. The login
    event is unavoidable; MFA-state and geo are the discriminators.
  event_names: [ConsoleLogin]

observability:
  status: CONFIRM
  cloudtrail_event_category: Management
  signal_field: additionalEventData.MFAUsed; responseElements.ConsoleLogin; sourceIPAddress (real user egress IP)
  ingestion_notes: >
    CONFIRM console sign-ins are forwarded in your environment (management-account / org
    trail). SSO/federated logins normally show MFAUsed=No because MFA is enforced upstream
    at the IdP — scope the MFA-bypass branch to NON-SSO IAMUser logins to avoid mass FPs.
    Federated (AssumeRoleWithSAML) source IPs are often broker/service IPs, NOT the user's
    location — use ConsoleLogin's sourceIPAddress for geo, not the SAML assume.

detection:
  research:
    logic: "eventName=ConsoleLogin — group by identity type, country, MFAUsed."
    fp_rate: high
  hunt:
    logic: "IAMUser logins with MFAUsed=No; and logins from countries outside your operating set."
    fp_rate: medium
  analyst:
    logic: >
      (IAMUser AND MFAUsed=No) OR (source country not in your operating-geo allowlist).
      Geo list and identity exceptions from YOUR baseline.
    fp_rate: low
    severity: HIGH

variations:
  - GetSigninToken abuse; federated sign-in from a new IdP
  - Impossible-travel across a single STS session

evolution_timeline:
  - "Credential-stuffing / phished-console access is a top cloud initial-access vector; ConsoleLogin is stable."

raw_logs:
  - 'eventName=ConsoleLogin, userIdentity.type=IAMUser, additionalEventData.MFAUsed="No", responseElements.ConsoleLogin="Success" (redacted).'

related:
  - sts-cross-account-new-principal

references:
  - "MITRE ATT&CK T1078.004 — Valid Accounts: Cloud Accounts"
  - "Threat intel [AGGREGATE]: Valid-account abuse = 35% of cloud incidents H1 2024 (CrowdStrike 2025 GTR); stolen creds #2 vector at 16% (M-Trends 2025) — see trends/aws-chokepoint-convergence.md"
