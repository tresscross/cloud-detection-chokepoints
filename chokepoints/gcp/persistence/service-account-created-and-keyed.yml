id: gcp-service-account-created-and-keyed
name: New service account created and keyed (durable foothold)
cloud: gcp
tactic: persistence
attack_technique: [T1136.003, T1098.001]
priority: HIGH
prevalence: MEDIUM
difficulty: LOW

chokepoint:
  technique: >
    A durable non-human foothold requires creating a service account and then a key (or an
    owner binding). Both calls are unavoidable and always logged.
  preconditions: >
    A credential holding iam.serviceAccounts.create and iam.serviceAccountKeys.create.
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    CreateServiceAccount followed (same actor, short window) by CreateServiceAccountKey and/or
    a SetIamPolicy binding roles/owner to the new SA. Composite. Stratus
    create-admin-service-account performs exactly this.
  operations: [google.iam.admin.v1.CreateServiceAccount, google.iam.admin.v1.CreateServiceAccountKey]
  variations: [Stratus gcp.persistence.create-admin-service-account]

observability:
  status: OBSERVABLE
  log_source: GCP Cloud Audit Log
  log_class: ADMIN_ACTIVITY
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.resourceName
  notes: >
    methodName confidence: confirmed

detection:
  research: { fp_rate: high, logic: "CreateServiceAccount — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      CreateServiceAccount followed (same actor, short window) by CreateServiceAccountKey
      and/or a SetIamPolicy binding roles/owner to the new SA.
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      CreateServiceAccount followed (same actor, short window) by CreateServiceAccountKey
      and/or a SetIamPolicy binding roles/owner to the new SA; exclude known-benign automation
      (allowlist from your baseline).

validation_tier: CAPABILITY
actors: []
related: []
references:
  - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.persistence.create-admin-service-account/
  - https://attack.mitre.org/techniques/T1136/003/
  - "trends/gcp-chokepoint-convergence.md"
