id: gcp-privileged-service-account-attach
name: Attach a privileged service account to a new resource (actAs / PassRole-analog)
cloud: gcp
tactic: privilege-escalation
attack_technique: [T1078.004]
priority: CRITICAL
prevalence: HIGH
difficulty: HIGH

chokepoint:
  technique: >
    To use a more-privileged SA, an attacker attaches it (actAs) to a resource they create and
    reads its token from the runtime/metadata. actAs itself emits no event — the create call
    is the observable choke.
  preconditions: >
    A credential holding iam.serviceAccounts.actAs plus a resource-create permission
    (compute.instances.create / cloudfunctions.functions.create / run.services.create /
    cloudscheduler.jobs.create).
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    The created resource's attached serviceAccount is higher-privileged than the creator (or
    is the default compute/appengine Editor SA), AND the creator does not normally deploy that
    resource type. Correlate create -> token use.
  operations:
    - v1.compute.instances.insert
    - google.cloud.functions.v1.CloudFunctionsService.CreateFunction
    - google.cloud.functions.v2.FunctionService.CreateFunction
    - google.cloud.run.v1.Services.CreateService
    - google.cloud.run.v1.Services.ReplaceService
    - google.cloud.scheduler.v1.CloudScheduler.CreateJob   # VALIDATE
  variations:
    - "GCPloit / GCP-IAM-Privilege-Escalation actAs paths (functions/run/compute/scheduler)"
    - "Tenable ImageRunner (Cloud Run ReplaceService + actAs)"

observability:
  status: OBSERVABLE
  log_source: GCP Cloud Audit Log
  log_class: ADMIN_ACTIVITY
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.request.*.serviceAccount;
    protoPayload.resourceName
  notes: >
    Composite — needs create event + attached-SA privilege comparison; actAs has no standalone
    log.
    methodName confidence: create methodNames confirmed except scheduler (VALIDATE)

detection:
  research: { fp_rate: high, logic: "Resource create (instances.insert / CreateFunction / CreateService / ReplaceService / CreateJob) — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      The created resource's attached serviceAccount is higher-privileged than the creator (or
      is the default compute/appengine Editor SA), AND the creator does not normally deploy
      that resource type.
  analyst:
    fp_rate: low
    severity: CRITICAL
    logic: >
      The created resource's attached serviceAccount is higher-privileged than the creator (or
      is the default compute/appengine Editor SA), AND the creator does not normally deploy
      that resource type; correlate create -> token use; exclude known-benign automation
      (allowlist from your baseline).

validation_tier: CAPABILITY
actors: []
related: []
references:
  - https://www.tenable.com/blog/imagerunner-a-privilege-escalation-vulnerability-impacting-gcp-cloud-run
  - https://www.praetorian.com/blog/google-cloud-platform-gcp-service-account-based-privilege-escalation-paths/
  - "trends/gcp-chokepoint-convergence.md"
