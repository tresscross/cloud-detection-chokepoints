id: gcp-service-account-tokencreator-grant
name: Backdoor a service account via its IAM policy (grant TokenCreator)
cloud: gcp
tactic: privilege-escalation
attack_technique: [T1098.003]
priority: CRITICAL
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    To be able to impersonate a specific SA, an attacker grants themselves
    serviceAccountTokenCreator on that SA — a setIamPolicy on the SA resource.
  preconditions: >
    A credential holding iam.serviceAccounts.setIamPolicy on the target service account.
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    ADD of roles/iam.serviceAccountTokenCreator (or serviceAccountUser) to an external / new /
    self principal on a SA — especially a high-priv or default SA.
  operations: [google.iam.admin.v1.SetIAMPolicy]   # note capitalization SetIAMPolicy
  variations: [Stratus gcp.persistence.backdoor-service-account-policy]

observability:
  status: OBSERVABLE
  log_source: GCP Cloud Audit Log
  log_class: ADMIN_ACTIVITY
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.resourceName;
    protoPayload.serviceData.policyDelta.bindingDeltas
  notes: >
    methodName confidence: confirmed (Datadog)

detection:
  research: { fp_rate: high, logic: "SetIAMPolicy (on the service account) — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      ADD of roles/iam.serviceAccountTokenCreator (or serviceAccountUser) to an external /
      new / self principal on a SA — especially a high-priv or default SA.
  analyst:
    fp_rate: low
    severity: CRITICAL
    logic: >
      ADD of roles/iam.serviceAccountTokenCreator (or serviceAccountUser) to an external /
      new / self principal on a SA — especially a high-priv or default SA; exclude
      known-benign automation (allowlist from your baseline).

validation_tier: CAPABILITY
actors: []
related: []
references:
  - https://securitylabs.datadoghq.com/cloud-security-atlas/attacks/backdooring-service-account/
  - "trends/gcp-chokepoint-convergence.md"
