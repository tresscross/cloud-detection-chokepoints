# GCP detection chokepoints — Impact (TA0040) & Exfiltration (TA0010)
# Schema: reference/chokepoints-methodology.md. Scope queries with #Vendor=gcp.

- id: CP-GCP-IMP-01
  name: Resource hijacking — compute spun up for cryptomining
  tactic: Impact (TA0040)
  technique: [T1496, T1496.001, T1496.004]
  priority: HIGH
  prevalence: VERY HIGH
  detection_difficulty: MEDIUM
  invariant: >
    Monetizing a compromised project via mining requires creating compute. The
    instance-create call is unavoidable. GCAT: ~65% of compromised cloud accounts
    were used for cryptomining; one incident used a compromised App Engine default
    SA to spin up 1,600+ GPU VMs across regions.
  observable:
    method_names: [v1.compute.instances.insert, beta.compute.instances.insert]
    service_name: compute.googleapis.com
    audit_log_class: ADMIN_ACTIVITY   # always on
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.request.guestAccelerators   # GPUs
      - protoPayload.request.machineType
      - protoPayload.resourceName                # zone
  narrowing_invariant: >
    Bursts of instances.insert (many zones/regions in a short window), GPU
    guestAccelerators or large machineType, unusual zones, or creation by a
    default/rarely-deploying SA. Single insert is normal; the burst/shape is the
    signal.
  tool_variations:
    - Stratus gcp.impact.create-gpu-vm
    - Stratus gcp.impact.create-instances-in-multiple-zones
  actors: ["Cryptomining crews (TeamTNT-linked, leaked-key abusers)"]
  observability_status: OBSERVABLE
  detection_maturity: research
  methodname_confidence: confirmed
  references:
    - https://securitylabs.datadoghq.com/articles/google-cloud-threat-detection/
    - https://attack.mitre.org/techniques/T1496/

- id: CP-GCP-IMP-02
  name: Cross-project data transfer via resource IAM sharing
  tactic: Exfiltration (TA0010)
  technique: [T1537]                 # Transfer Data to Cloud Account
  priority: HIGH
  prevalence: MEDIUM
  detection_difficulty: MEDIUM
  invariant: >
    Exfil that never leaves Google is done by sharing a disk/image/snapshot (or
    exporting a DB) to an attacker-controlled project — a setIamPolicy on the
    resource, or an export call.
  observable:
    method_names:
      - v1.compute.disks.setIamPolicy
      - v1.compute.images.setIamPolicy
      - v1.compute.snapshots.setIamPolicy
      - cloudsql.instances.export
    service_name: [compute.googleapis.com, sqladmin.googleapis.com]
    audit_log_class: ADMIN_ACTIVITY
    fields: [protoPayload.authenticationInfo.principalEmail, protoPayload.request.policy.bindings, protoPayload.resourceName]
  narrowing_invariant: >
    Binding grants a principal in an EXTERNAL project/domain; disk/image/snapshot
    shared out; cloudsql export destination bucket in a different project.
  tool_variations:
    - Stratus gcp.exfiltration.share-compute-disk / share-compute-image / share-compute-snapshot
  actors: ["UNC4899 (Cloud SQL tampering / crypto heist)"]
  observability_status: OBSERVABLE
  detection_maturity: research
  methodname_confidence: setIamPolicy variants confirmed (Stratus); cloudsql.instances.export per Datadog
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.exfiltration.share-compute-disk/
    - https://attack.mitre.org/techniques/T1537/

- id: CP-GCP-IMP-03
  name: GCS bucket / object made public
  tactic: Impact (TA0040)            # exposure / exfil enabler
  technique: [T1537]
  priority: HIGH
  prevalence: MEDIUM
  detection_difficulty: LOW
  invariant: >
    Making storage world-readable requires granting allUsers/allAuthenticatedUsers
    on the bucket/object IAM policy — an Admin Activity setIamPolicy.
  observable:
    method_names: [storage.setIamPermissions, SetIamPolicy]
    service_name: storage.googleapis.com
    audit_log_class: ADMIN_ACTIVITY
    fields: [protoPayload.authenticationInfo.principalEmail, protoPayload.serviceData.policyDelta.bindingDeltas, protoPayload.resourceName]
  narrowing_invariant: >
    bindingDeltas ADD allUsers or allAuthenticatedUsers as objectViewer/reader on
    a bucket not intended to be public.
  observability_status: OBSERVABLE
  observability_note: bindingDeltas in deprecated serviceData may be dropped on export — validate.
  detection_maturity: research
  methodname_confidence: storage.setIamPermissions confirmed by convention
  references:
    - https://www.sysdig.com/blog/suspicious-activity-gcp-audit-logs

- id: CP-GCP-IMP-04
  name: Bulk object read / data exfiltration from Cloud Storage
  tactic: Exfiltration (TA0010)
  technique: [T1530]                 # Data from Cloud Storage
  priority: HIGH
  prevalence: HIGH
  detection_difficulty: HIGH
  invariant: >
    Reading objects out of a bucket must call the object-get API. High-volume get
    is the exfil choke.
  observable:
    method_names: [storage.objects.get, storage.objects.list]
    service_name: storage.googleapis.com
    audit_log_class: DATA_ACCESS      # DATA_READ — OFF BY DEFAULT
    fields: [protoPayload.authenticationInfo.principalEmail, protoPayload.resourceName]
  narrowing_invariant: >
    High-rate objects.get across many objects by one principal; new principal for
    the bucket; egress-shaped access pattern.
  observability_status: BLIND_BY_DEFAULT
  observability_note: >
    INGEST GAP (direct GCP analog of AWS S3 GetObject-not-ingested). GCS DATA_READ
    is off by default. NOTE the one exception across GCP: BigQuery data reads ARE
    on by default — BigQuery exfil (jobservice/tabledata reads) is observable.
  detection_maturity: research
  methodname_confidence: confirmed
  references:
    - https://attack.mitre.org/techniques/T1530/

- id: CP-GCP-IMP-05
  name: Data destruction / ransomware (mass delete or client-side re-encrypt)
  tactic: Impact (TA0040)
  technique: [T1485, T1486, T1490]
  priority: HIGH
  prevalence: MEDIUM
  detection_difficulty: MEDIUM
  invariant: >
    Destructive impact requires either deleting objects (incl. noncurrent
    versions) or rewriting them under an attacker CSEK key.
  observable:
    method_names: [storage.objects.delete, storage.objects.rewrite]
    service_name: storage.googleapis.com
    audit_log_class: ADMIN_ACTIVITY   # object delete/rewrite metadata; note contrast with DATA_READ get
    fields: [protoPayload.authenticationInfo.principalEmail, protoPayload.resourceName]
  narrowing_invariant: >
    Bursts of objects.delete across a bucket (incl. all versions), or
    objects.rewrite with a customer-supplied encryption key (CSEK) — the GCS
    ransomware pattern. Correlate with log-bucket deletion (CP-GCP-DE-02).
  tool_variations:
    - Stratus gcp.impact.gcs-ransomware-individual-deletion
    - Stratus gcp.impact.gcs-ransomware-client-side-encryption
  observability_status: OBSERVABLE
  observability_note: >
    Object write/delete land in Data Access DATA_WRITE (off by default) for some
    configs; the Stratus ransomware modules check delete+create perms. VALIDATE
    which class your ingest captures for object mutations.
  detection_maturity: research
  methodname_confidence: confirmed (Stratus)
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.impact.gcs-ransomware-client-side-encryption/
    - https://attack.mitre.org/techniques/T1485/
