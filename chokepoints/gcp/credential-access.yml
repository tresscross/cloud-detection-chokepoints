# GCP detection chokepoints — Credential Access (TA0006)
# Schema: reference/chokepoints-methodology.md. Scope queries with #Vendor=gcp.

- id: CP-GCP-CA-01
  name: Service-account key creation (long-lived credential minting)
  tactic: Credential Access (TA0006)   # dual: Persistence T1098.001
  technique: [T1098.001]
  priority: CRITICAL
  prevalence: HIGH
  detection_difficulty: LOW
  invariant: >
    To obtain a portable, long-lived credential for a service account an attacker
    must call the key-creation API. There is no other way to mint a downloadable
    SA key.
  observable:
    method_names: [google.iam.admin.v1.CreateServiceAccountKey]
    service_name: iam.googleapis.com
    audit_log_class: ADMIN_ACTIVITY   # always on
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.resourceName        # the target SA
      - protoPayload.requestMetadata.callerIp
  narrowing_invariant: >
    Key created BY a user principal (not automation), or ON a high-privilege /
    default (App Engine, Compute) SA, or cross-project, or in a burst. Mature
    orgs prefer impersonation/WIF, so any user-driven key creation is notable.
  tool_variations:
    - "gcloud iam service-accounts keys create"
    - Stratus gcp.persistence.create-service-account-key
  actors:
    - "Real IR: Expel GCP incident — attacker attempted SA key creation via gcloud (failed on IAM perms)"
    - "Leaked-key abusers → cryptomining (Google auto-disables detected leaked SA keys since 2024-06-16)"
  observability_status: OBSERVABLE
  detection_maturity: research      # sev 30
  methodname_confidence: confirmed (Stratus, Mitiga)
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.persistence.create-service-account-key/
    - https://cloud.google.com/blog/products/identity-security/automatically-disabling-leaked-service-account-keys-what-you-need-to-know
    - https://attack.mitre.org/techniques/T1098/001/

- id: CP-GCP-CA-02
  name: Service-account impersonation — access/OIDC token minting & signing
  tactic: Credential Access (TA0006)   # also Priv-Esc / Lateral Movement
  technique: [T1550.001, T1528]
  priority: CRITICAL
  prevalence: HIGH
  detection_difficulty: HIGH
  invariant: >
    Acting as a service account without its static key requires the IAM
    Credentials API to issue a token or signature. The token-issuance call is
    the unavoidable choke — and it records BOTH the caller and the impersonated
    SA (authenticationInfo + serviceAccountDelegationInfo).
  observable:
    method_names: [GenerateAccessToken, GenerateIdToken, SignBlob, SignJwt]
    service_name: iamcredentials.googleapis.com
    audit_log_class: DATA_ACCESS      # ADMIN_READ subtype — OFF BY DEFAULT
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.request.name         # impersonated SA
      - protoPayload.authenticationInfo.serviceAccountDelegationInfo
  narrowing_invariant: >
    Caller lower-privileged than the target SA; cross-project impersonation;
    first-seen caller→target pairing; impersonation of default compute/appengine
    (Editor) SA; multi-hop delegation chains (implicitDelegation).
  tool_variations:
    - "gcloud --impersonate-service-account"
    - GCPloit / GCP-IAM-Privilege-Escalation getAccessToken/signJwt/signBlob paths
    - Stratus gcp.privilege-escalation.impersonate-service-accounts
  actors:
    - "Convergence point for cryptomining crews and nation-state (UNC4899 CI/CD SA-token abuse)"
  observability_status: BLIND_BY_DEFAULT
  observability_note: >
    TOP GCP INGEST GAP (analog of AWS S3 GetObject). iamcredentials methods are
    Data Access (ADMIN_READ) and produce NO log until DATA_READ is explicitly
    enabled for iamcredentials.googleapis.com. Highest-value config change to
    unblock this chokepoint. Track as an ingest gap, not a shippable rule, until
    enabled.
  detection_maturity: research      # sev 30 once observable
  methodname_confidence: short methodName confirmed; fully-qualified form VALIDATE
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.privilege-escalation.impersonate-service-accounts/
    - https://securitylabs.datadoghq.com/cloud-security-atlas/attacks/backdooring-service-account/
    - https://attack.mitre.org/techniques/T1550/001/

- id: CP-GCP-CA-03
  name: Secret Manager secret access
  tactic: Credential Access (TA0006)
  technique: [T1555.006]            # Credentials from Password Stores: Cloud Secrets Mgmt
  priority: HIGH
  prevalence: MEDIUM
  detection_difficulty: HIGH
  invariant: >
    Reading a stored secret value must call AccessSecretVersion — the retrieval
    is the choke regardless of what the secret is later used for.
  observable:
    method_names: [google.cloud.secretmanager.v1.SecretManagerService.AccessSecretVersion]
    service_name: secretmanager.googleapis.com
    audit_log_class: DATA_ACCESS      # DATA_READ — OFF BY DEFAULT
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.resourceName
  narrowing_invariant: >
    Access by a human/user principal (vs the expected workload SA); mass reads
    across many secrets (ListSecrets then AccessSecretVersion loop); first-time
    principal for a given secret.
  tool_variations:
    - Stratus gcp.credential-access.secretmanager-retrieve-secrets (enumerate + read all)
  observability_status: BLIND_BY_DEFAULT
  observability_note: Requires DATA_READ enabled for secretmanager.googleapis.com.
  detection_maturity: research
  methodname_confidence: confirmed
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.credential-access.secretmanager-retrieve-secrets/
    - https://attack.mitre.org/techniques/T1555/006/

- id: CP-GCP-CA-04
  name: Compute instance metadata token theft (SA token from 169.254.169.254)
  tactic: Credential Access (TA0006)
  technique: [T1552.005]            # Unsecured Credentials: Cloud Instance Metadata API
  priority: HIGH
  prevalence: HIGH
  detection_difficulty: HIGH
  invariant: >
    An in-VM foothold that wants the attached SA's token reads it from the
    metadata service; remote harvesting reads startup-script/metadata via the
    Compute API.
  observable:
    # In-VM metadata reads are NOT audit-logged; the observable choke is the
    # remote metadata pull and subsequent off-GCP token use.
    method_names: [compute.instances.get, compute.instances.list]
    service_name: compute.googleapis.com
    audit_log_class: DATA_ACCESS      # ADMIN_READ for get/list — OFF BY DEFAULT
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.requestMetadata.callerIp
  narrowing_invariant: >
    Same SA token later seen from a non-Google callerIp (correlate with
    CP-GCP-IA-01 use-compute-sa-outside-gcp); bulk instance metadata pulls.
  tool_variations:
    - Stratus gcp.discovery.download-instance-metadata
    - Stratus gcp.initial-access.use-compute-sa-outside-gcp
  observability_status: BLIND_BY_DEFAULT
  observability_note: In-VM 169.254.169.254 reads are never logged; get/list are Data Access.
  detection_maturity: research
  methodname_confidence: confirmed
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.discovery.download-instance-metadata/
    - https://attack.mitre.org/techniques/T1552/005/
