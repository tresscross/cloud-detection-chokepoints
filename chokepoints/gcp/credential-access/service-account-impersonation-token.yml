id: gcp-service-account-impersonation-token
name: Service-account impersonation — access/OIDC token minting & signing
cloud: gcp
tactic: credential-access
attack_technique: [T1550.001, T1528]
priority: CRITICAL
prevalence: HIGH
difficulty: HIGH

chokepoint:
  technique: >
    Acting as a service account without its static key requires the IAM Credentials API to
    issue a token or signature. The token-issuance call is the unavoidable choke — and it
    records BOTH the caller and the impersonated SA (authenticationInfo +
    serviceAccountDelegationInfo).
  preconditions: >
    A credential holding iam.serviceAccounts.getAccessToken / getOpenIdToken / signBlob /
    signJwt on the target service account.
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    Caller lower-privileged than the target SA; cross-project impersonation; first-seen
    caller→target pairing; impersonation of default compute/appengine (Editor) SA; multi-hop
    delegation chains (implicitDelegation).
  operations: [GenerateAccessToken, GenerateIdToken, SignBlob, SignJwt]
  variations:
    - "gcloud --impersonate-service-account"
    - GCPloit / GCP-IAM-Privilege-Escalation getAccessToken/signJwt/signBlob paths
    - Stratus gcp.privilege-escalation.impersonate-service-accounts

observability:
  status: INGEST_GAP
  log_source: GCP Cloud Audit Log
  log_class: DATA_ACCESS            # ADMIN_READ subtype — OFF BY DEFAULT
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.request.name;
    protoPayload.authenticationInfo.serviceAccountDelegationInfo
  notes: >
    TOP GCP INGEST GAP (analog of AWS S3 GetObject). iamcredentials methods are Data Access
    (ADMIN_READ) and produce NO log until DATA_READ is explicitly enabled for
    iamcredentials.googleapis.com. Highest-value config change to unblock this chokepoint.
    Track as an ingest gap, not a shippable rule, until enabled.
    methodName confidence: short methodName confirmed; fully-qualified form VALIDATE

detection:
  research: { fp_rate: high, logic: "GenerateAccessToken / GenerateIdToken / SignBlob / SignJwt — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      Caller lower-privileged than the target SA; cross-project impersonation; first-seen
      caller→target pairing; impersonation of default compute/appengine (Editor) SA;
      multi-hop delegation chains (implicitDelegation).
  analyst:
    fp_rate: low
    severity: CRITICAL
    logic: >
      Caller lower-privileged than the target SA; cross-project impersonation; first-seen
      caller→target pairing; impersonation of default compute/appengine (Editor) SA;
      multi-hop delegation chains (implicitDelegation); exclude known-benign automation
      (allowlist from your baseline).

validation_tier: CAPABILITY
actors:
  - "Convergence point for cryptomining crews and nation-state (UNC4899 CI/CD SA-token abuse)"
related: []
references:
  - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.privilege-escalation.impersonate-service-accounts/
  - https://securitylabs.datadoghq.com/cloud-security-atlas/attacks/backdooring-service-account/
  - https://attack.mitre.org/techniques/T1550/001/
  - "trends/gcp-chokepoint-convergence.md"
