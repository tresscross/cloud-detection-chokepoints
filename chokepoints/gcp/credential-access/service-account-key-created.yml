id: gcp-service-account-key-created
name: Service-account key creation (long-lived credential minting)
cloud: gcp
tactic: credential-access
attack_technique: [T1098.001]
priority: CRITICAL
prevalence: HIGH
difficulty: LOW

chokepoint:
  technique: >
    To obtain a portable, long-lived credential for a service account an attacker must call
    the key-creation API. There is no other way to mint a downloadable SA key.
  preconditions: >
    A credential holding iam.serviceAccountKeys.create on the target service account.
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    Key created BY a user principal (not automation), or ON a high-privilege / default
    (App Engine, Compute) SA, or cross-project, or in a burst. Mature orgs prefer
    impersonation/WIF, so any user-driven key creation is notable.
  operations: [google.iam.admin.v1.CreateServiceAccountKey]
  variations:
    - "gcloud iam service-accounts keys create"
    - Stratus gcp.persistence.create-service-account-key

observability:
  status: OBSERVABLE
  log_source: GCP Cloud Audit Log
  log_class: ADMIN_ACTIVITY
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.resourceName;
    protoPayload.requestMetadata.callerIp
  notes: >
    methodName confidence: confirmed (Stratus, Mitiga)

detection:
  research: { fp_rate: high, logic: "CreateServiceAccountKey — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      Key created by a user principal (not automation), or on a high-privilege / default
      (App Engine, Compute) SA, or cross-project, or in a burst.
  analyst:
    fp_rate: low
    severity: CRITICAL
    logic: >
      Key created by a user principal (not automation), or on a high-privilege / default
      (App Engine, Compute) SA, or cross-project, or in a burst; exclude known-benign
      automation (allowlist from your baseline).

validation_tier: INCIDENT
actors:
  - "Real IR: Expel GCP incident — attacker attempted SA key creation via gcloud (failed on IAM perms)"
  - "Leaked-key abusers → cryptomining (Google auto-disables detected leaked SA keys since 2024-06-16)"
related: []
references:
  - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.persistence.create-service-account-key/
  - https://cloud.google.com/blog/products/identity-security/automatically-disabling-leaked-service-account-keys-what-you-need-to-know
  - https://attack.mitre.org/techniques/T1098/001/
  - "trends/gcp-chokepoint-convergence.md"
