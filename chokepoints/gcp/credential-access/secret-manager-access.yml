id: gcp-secret-manager-access
name: Secret Manager secret access
cloud: gcp
tactic: credential-access
attack_technique: [T1555.006]
priority: HIGH
prevalence: MEDIUM
difficulty: HIGH

chokepoint:
  technique: >
    Reading a stored secret value must call AccessSecretVersion — the retrieval is the choke
    regardless of what the secret is later used for.
  preconditions: >
    A credential holding secretmanager.versions.access on the target secret.
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    Access by a human/user principal (vs the expected workload SA); mass reads across many
    secrets (ListSecrets then AccessSecretVersion loop); first-time principal for a given
    secret.
  operations: [google.cloud.secretmanager.v1.SecretManagerService.AccessSecretVersion]
  variations:
    - Stratus gcp.credential-access.secretmanager-retrieve-secrets (enumerate + read all)

observability:
  status: INGEST_GAP
  log_source: GCP Cloud Audit Log
  log_class: DATA_ACCESS            # DATA_READ — OFF BY DEFAULT
  signal_field: >
    protoPayload.authenticationInfo.principalEmail; protoPayload.resourceName
  notes: >
    Requires DATA_READ enabled for secretmanager.googleapis.com.
    methodName confidence: confirmed

detection:
  research: { fp_rate: high, logic: "AccessSecretVersion — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      Access by a human/user principal (vs the expected workload SA); mass reads across many
      secrets (ListSecrets then AccessSecretVersion loop); first-time principal for a given
      secret.
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      Access by a human/user principal (vs the expected workload SA); mass reads across many
      secrets (ListSecrets then AccessSecretVersion loop); first-time principal for a given
      secret; exclude known-benign automation (allowlist from your baseline).

validation_tier: CAPABILITY
actors: []
related: []
references:
  - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.credential-access.secretmanager-retrieve-secrets/
  - https://attack.mitre.org/techniques/T1555/006/
  - "trends/gcp-chokepoint-convergence.md"
