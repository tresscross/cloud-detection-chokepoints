# GCP detection chokepoints — Discovery (TA0007)
# Schema: reference/chokepoints-methodology.md. Scope queries with #Vendor=gcp.
#
# HEADLINE: nearly all GCP discovery reads are ADMIN_READ (Data Access) and are
# OFF BY DEFAULT. In a default org, project/SA/bucket/instance enumeration and
# testIamPermissions brute-forcing produce NO log. The discovery chokepoint is
# therefore a *configuration prerequisite* (enable Data Access logging) before a
# methodName signal exists. Pivot to always-on Admin Activity actions
# (CreateServiceAccountKey, SetIamPolicy) as the backstop for a recon campaign.

- id: CP-GCP-DISC-01
  name: IAM permission brute-forcing (testIamPermissions / queryTestablePermissions)
  tactic: Discovery (TA0007)
  technique: [T1087.004, T1069.003]
  priority: HIGH
  prevalence: HIGH
  detection_difficulty: HIGH
  invariant: >
    To map what a stolen principal can do, an attacker enumerates its effective
    permissions. The unavoidable call is testIamPermissions (or getIamPolicy when
    permitted), typically in batches of 100 up to ~9,500 permissions.
  observable:
    method_names:
      - projects.testIamPermissions          # cloudresourcemanager; FQ form VALIDATE
      - google.iam.admin.v1.TestIAMPermissions
      - google.iam.admin.v1.QueryTestablePermissions
    service_name: [cloudresourcemanager.googleapis.com, iam.googleapis.com]
    audit_log_class: DATA_ACCESS      # ADMIN_READ — OFF BY DEFAULT
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.request.permissions      # cardinality
      - protoPayload.status.code              # PERMISSION_DENIED bursts
  narrowing_invariant: >
    Repeated testIamPermissions from a single principal in a short window; large
    permissions[] cardinality; service-account (not interactive) principal; burst
    of PERMISSION_DENIED.
  tool_variations: [GCPHound, gcpwn, gcp_scanner, "Bruteforce-GCP-Permissions", ScoutSuite]
  observability_status: BLIND_BY_DEFAULT
  observability_note: Requires Data Access (ADMIN_READ) on Resource Manager + IAM.
  detection_maturity: research
  methodname_confidence: behavior confirmed (Stratus); exact FQ strings VALIDATE
  references:
    - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.discovery.enumerate-permissions/
    - https://attack.mitre.org/techniques/T1087/004/

- id: CP-GCP-DISC-02
  name: Org-wide asset enumeration via Cloud Asset Inventory
  tactic: Discovery (TA0007)
  technique: [T1580]                 # Cloud Infrastructure Discovery
  priority: MEDIUM
  prevalence: MEDIUM
  detection_difficulty: HIGH
  invariant: >
    The single fastest way to enumerate an entire org is the Cloud Asset API —
    one SearchAllResources / SearchAllIamPolicies call returns everything.
  observable:
    method_names: [SearchAllResources, SearchAllIamPolicies]  # cloudasset; FQ VALIDATE
    service_name: cloudasset.googleapis.com
    audit_log_class: DATA_ACCESS      # ADMIN_READ — OFF BY DEFAULT
    fields:
      - protoPayload.authenticationInfo.principalEmail
      - protoPayload.resourceName      # org/folder scope
  narrowing_invariant: >
    Org- or folder-scope asset search by a non-admin/workload principal or from
    an unusual callerIp. Rare for workload SAs.
  tool_variations: ["gcloud asset search-all-resources", ScoutSuite (Asset API mode)]
  observability_status: BLIND_BY_DEFAULT
  observability_note: Requires Data Access on cloudasset.googleapis.com.
  detection_maturity: research
  methodname_confidence: class confirmed; FQ strings VALIDATE
  references:
    - https://cloud.google.com/asset-inventory/docs/audit-logging
    - https://attack.mitre.org/techniques/T1580/

- id: CP-GCP-DISC-03
  name: Resource enumeration (instances/buckets/service-accounts list)
  tactic: Discovery (TA0007)
  technique: [T1580, T1526]
  priority: MEDIUM
  prevalence: HIGH
  detection_difficulty: HIGH
  invariant: >
    A foothold must enumerate what it can reach — compute, storage, identities —
    via list/get APIs before acting.
  observable:
    method_names: [v1.compute.instances.list, storage.buckets.list, google.iam.admin.v1.ListServiceAccounts]
    service_name: [compute.googleapis.com, storage.googleapis.com, iam.googleapis.com]
    audit_log_class: DATA_ACCESS      # ADMIN_READ — OFF BY DEFAULT
    fields: [protoPayload.authenticationInfo.principalEmail, protoPayload.requestMetadata.callerIp]
  narrowing_invariant: >
    A service-account principal listing storage buckets is a notable anomaly
    (workload SAs normally access known buckets, not enumerate). Wide fan-out
    across many resourceNames from one principal.
  tool_variations: [gcpwn, gcp_scanner, GCPHound]
  observability_status: BLIND_BY_DEFAULT
  observability_note: Requires Data Access per service; ListServiceAccounts string is convention-based (VALIDATE).
  detection_maturity: research
  methodname_confidence: storage.buckets.list confirmed; others VALIDATE
  references:
    - https://www.datadoghq.com/blog/monitoring-gcp-audit-logs/
    - https://attack.mitre.org/techniques/T1580/
