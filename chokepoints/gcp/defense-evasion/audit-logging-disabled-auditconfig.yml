id: gcp-audit-logging-disabled-auditconfig
name: Audit logging disabled via IAM auditConfig change
cloud: gcp
tactic: defense-evasion
attack_technique: [T1562.008]
priority: HIGH
prevalence: EMERGING
difficulty: HIGH

chokepoint:
  technique: >
    Turning off Data Access / audit logging for a service is done by editing the IAM policy
    auditConfigs via SetIamPolicy.
  preconditions: >
    A credential holding resourcemanager.projects.setIamPolicy (to edit auditConfigs).
  attacker_controls: [user agent, source IP, tool, timing]
  invariant: >
    SetIamPolicy whose delta removes/reduces auditConfigs (e.g. drops ADMIN_READ/DATA_READ
    for a service such as storage.googleapis.com).
  operations: [SetIamPolicy]

observability:
  status: OBSERVABLE
  log_source: GCP Cloud Audit Log
  log_class: ADMIN_ACTIVITY
  signal_field: protoPayload.serviceData.policyDelta.auditConfigDeltas   # deprecated - see caveat
  notes: >
    DETECTION GAP — auditConfigDeltas lived in the deprecated protoPayload.serviceData and is
    frequently EMPTY/DROPPED in exported logs; enable vs disable are the same SetIamPolicy
    call. A SIEM on exported logs may not distinguish direction. Validate against a live
    sample; prefer protoPayload.metadata.
    methodName confidence: methodName confirmed; delta-field reliability POOR on exported logs

detection:
  research: { fp_rate: high, logic: "SetIamPolicy (auditConfig change) — every occurrence." }
  hunt:
    fp_rate: medium
    logic: >
      SetIamPolicy whose delta removes/reduces auditConfigs (e.g. drops ADMIN_READ/DATA_READ
      for a service such as storage.googleapis.com).
  analyst:
    fp_rate: low
    severity: HIGH
    logic: >
      SetIamPolicy whose delta removes/reduces auditConfigs (e.g. drops ADMIN_READ/DATA_READ
      for a service such as storage.googleapis.com); exclude known-benign automation
      (allowlist from your baseline).

validation_tier: CAPABILITY
actors: []
related: []
references:
  - https://permiso.io/blog/gcp-servicedata-officially-deprecated-actively-dangerous
  - https://stratus-red-team.cloud/attack-techniques/GCP/gcp.defense-evasion.disable-audit-logs/
  - "trends/gcp-chokepoint-convergence.md"
