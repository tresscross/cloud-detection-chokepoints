# Chokepoint entry template — copy to chokepoints/<tactic>/<slug>.yml
#
# Field definitions and valid enum values are in schema/chokepoint-schema.md.
# The spine is: what the attacker controls vs. what they cannot (the invariant).
# The `observability` block is the Q5 verdict against AWS CloudTrail.
#
# Use the AWS canonical example account 123456789012 for "our" account and
# 210987654321 / 999999999999 for "external". Never real account IDs, IPs, or names.

id: iam-create-policy-version                 # tactic-prefixed slug, unique repo-wide
name: IAM policy-version self-escalation
tactic: privilege-escalation                  # folder under chokepoints/ — see schema
attack_technique: [T1098.003]
priority: CRITICAL                            # CRITICAL | HIGH | MEDIUM
prevalence: HIGH                              # VERY_HIGH | HIGH | MEDIUM | EMERGING
difficulty: LOW                               # attacker difficulty: LOW | MEDIUM | HIGH

chokepoint:                                   # Q1-Q4, Q6 — the invariant analysis
  technique: >
    An identity with iam:CreatePolicyVersion on a managed policy it (or a role it holds)
    is bound to creates a new policy version granting Action:* / Resource:* and sets it
    as default, escalating to admin without touching CreateUser / AttachPolicy.
  preconditions: >
    Any credential holding iam:CreatePolicyVersion on a customer-managed policy in the
    escalation path.
  attacker_controls: [user agent, source IP, CLI vs SDK vs console, timing, policy name]
  invariant: >
    eventName is CreatePolicyVersion and the new version's document grants a wildcard
    action while setAsDefault=true. No tool can reach the outcome without emitting this
    call with those request parameters.
  event_names: [CreatePolicyVersion]

observability:                                # Q5 — against CloudTrail
  status: OBSERVABLE                          # OBSERVABLE | PARTIAL | INGEST_GAP | CONFIRM
  cloudtrail_event_category: Management
  signal_field: requestParameters.policyDocument (+ requestParameters.setAsDefault)
  ingestion_notes: >
    IAM writes are low-volume; any occurrence is review-worthy. The wildcard action and
    setAsDefault live in requestParameters — confirm your parser exposes them (they are
    NOT always lifted to top-level fields).

detection:                                    # three maturity tiers
  research:
    logic: >
      eventName=CreatePolicyVersion — every occurrence, no filter.
    fp_rate: high
  hunt:
    logic: >
      As research, plus setAsDefault=true; group by the underlying role
      (sessionIssuer.userName).
    fp_rate: medium
  analyst:
    logic: >
      As hunt, plus the policy document grants a wildcard action ("Action":"*"); exclude
      known IaC deploy roles (allowlist built from YOUR 30-day baseline).
    fp_rate: low
    severity: HIGH

variations:                                   # Q6 — other API paths to the same outcome
  - PutRolePolicy / PutUserPolicy (inline wildcard)   # see iam-inline-policy-self-escalation
  - AttachRolePolicy with AdministratorAccess         # see iam-privileged-policy-attach

evolution_timeline:
  - "Documented as a canonical AWS self-escalation primitive; API + request parameters
     unchanged since IAM managed-policy versioning launched."

raw_logs:
  - "eventName=CreatePolicyVersion, readOnly=false, userIdentity.type=AssumedRole,
     requestParameters.setAsDefault=true, policyDocument Action=* (redacted)."

related:
  - iam-inline-policy-self-escalation
  - iam-privileged-policy-attach

references:
  - "MITRE ATT&CK T1098.003 — Additional Cloud Roles"
