title: AWS IAM CreatePolicyVersion With Wildcard Action
id: a1c0de01-0001-4000-9000-0000000000c1
status: experimental
description: >
  Detects iam:CreatePolicyVersion setting a new default policy version. Analyst tier should
  additionally confirm the policy document grants a wildcard action ("Action":"*") — see
  chokepoints/privilege-escalation/iam-create-policy-version.yml. Self-escalation to admin.
references:
  - https://github.com/iimp0ster/detection-chokepoints
  - https://attack.mitre.org/techniques/T1098/003/
author: AWS Detection Chokepoints
date: 2026/07/03
tags:
  - attack.privilege-escalation
  - attack.t1098.003
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: iam.amazonaws.com
    eventName: CreatePolicyVersion
  filter_error:
    errorCode: '*'
  condition: selection and not filter_error
falsepositives:
  - Infrastructure-as-code deploy roles that legitimately version managed policies (allowlist from baseline)
level: high
