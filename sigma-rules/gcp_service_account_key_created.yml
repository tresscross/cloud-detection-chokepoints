title: GCP Service Account Key Created
id: b2c0de02-0001-4000-9000-0000000000d1
status: experimental
description: >
  Detects creation of a service-account key (a long-lived credential / persistence primitive).
  Analyst tier should scope to human/federated principals (not *.gserviceaccount.com automation).
  See chokepoints/gcp/credential-access.yml (CP-GCP-CA-01).
references:
  - https://github.com/iimp0ster/detection-chokepoints
  - https://attack.mitre.org/techniques/T1098/001/
author: Cloud Detection Chokepoints
date: 2026/07/05
tags:
  - attack.persistence
  - attack.t1098.001
logsource:
  product: gcp
  service: gcp.audit
detection:
  selection:
    data.protoPayload.methodName: google.iam.admin.v1.CreateServiceAccountKey
  condition: selection
falsepositives:
  - CI/CD or provisioning service accounts that legitimately mint keys (allowlist automation principals)
level: low
