title: GCP Service Account Created By User
id: b2c0de02-0002-4000-9000-0000000000d2
status: experimental
description: >
  Detects creation of a new IAM service account (persistence / backdoor identity), especially
  by a human principal. Pair with key-creation and privileged-grant detections for the full
  new-SA -> key -> grant chain. See chokepoints/gcp/persistence.yml (CP-GCP-PERS-01).
references:
  - https://github.com/iimp0ster/detection-chokepoints
  - https://attack.mitre.org/techniques/T1136/003/
author: Cloud Detection Chokepoints
date: 2026/07/05
tags:
  - attack.persistence
  - attack.t1136.003
logsource:
  product: gcp
  service: gcp.audit
detection:
  selection:
    data.protoPayload.methodName: google.iam.admin.v1.CreateServiceAccount
  condition: selection
falsepositives:
  - IaC/provisioning pipelines creating service accounts (allowlist automation principals)
level: low
